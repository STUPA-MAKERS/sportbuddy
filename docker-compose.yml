services:
  postgres:
    image: postgres:15-alpine
    container_name: spb_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./spb_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  altcha:
    image: ghcr.io/altcha-org/altcha-srv:latest
    container_name: spb_altcha
    environment:
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
      ALTCHA_MAX_NUMBER: "200000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: spb_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      PORT: ${PORT:-3000}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      API_SECRET: ${API_SECRET}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
      ALTCHA_API_URL: http://altcha:8080
    ports:
      - "8093:3000"
    depends_on:
      postgres:
        condition: service_healthy
      altcha:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: spb_frontend
    ports:
      - "8094:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  spb_pg_data:
